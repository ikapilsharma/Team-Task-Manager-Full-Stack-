<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none !important; }
    .badge { @apply inline-block px-2 py-0.5 rounded text-xs font-semibold; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">
  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8">
      <h1 class="text-2xl font-bold text-center mb-1">Team Task Manager</h1>
      <p class="text-center text-slate-500 mb-6 text-sm">Projects, tasks, and teams in one place.</p>
      <div class="flex border-b mb-4">
        <button id="tab-login" class="flex-1 py-2 font-semibold border-b-2 border-blue-600 text-blue-600">Login</button>
        <button id="tab-signup" class="flex-1 py-2 font-semibold border-b-2 border-transparent text-slate-500">Sign Up</button>
      </div>
      <form id="login-form" class="space-y-3">
        <input name="email" type="email" placeholder="you@example.com" required pattern="[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}" title="Enter a valid email like name@example.com" class="w-full border rounded-lg px-3 py-2" />
        <input name="password" type="password" placeholder="Password" required class="w-full border rounded-lg px-3 py-2" />
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">Login</button>
      </form>
      <form id="signup-form" class="space-y-3 hidden">
        <input name="name" placeholder="Full name" required class="w-full border rounded-lg px-3 py-2" />
        <input name="email" type="email" placeholder="you@example.com" required pattern="[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}" title="Enter a valid email like name@example.com" class="w-full border rounded-lg px-3 py-2" />
        <input name="password" type="password" placeholder="Password (min 6 chars)" required minlength="6" class="w-full border rounded-lg px-3 py-2" />
        <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">Create account</button>
      </form>
      <p id="auth-error" class="mt-3 text-sm text-red-600 text-center"></p>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" class="hidden">
    <header class="bg-white shadow-sm border-b">
      <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xl font-bold text-blue-600">📋 TaskHub</span>
        </div>
        <nav class="flex items-center gap-4">
          <button data-view="dashboard" class="nav-btn font-medium hover:text-blue-600">Dashboard</button>
          <button data-view="projects" class="nav-btn font-medium hover:text-blue-600">Projects</button>
          <span id="user-name" class="text-sm text-slate-600 hidden md:inline"></span>
          <button id="logout-btn" class="text-sm text-red-600 hover:underline">Logout</button>
        </nav>
      </div>
    </header>

    <main id="main-content" class="max-w-6xl mx-auto p-4 md:p-6"></main>
  </div>

  <!-- MODAL ROOT -->
  <div id="modal-root"></div>

  <script src="/app.js"></script>
</body>
</html>
